<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ocean</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(to bottom, #0a2540, #1e90ff);
  color: white;
  overflow-x: hidden;
}

/* 🌊 SVG WAVE（穩定版） */
.wave {
  position: absolute;
  bottom: 0;
  width: 100%;
}

.wave svg {
  animation: waveMove 6s linear infinite;
}

@keyframes waveMove {
  0% { transform: translateX(0); }
  100% { transform: translateX(-100px); }
}

/* STATS */
.stats {
  display: flex;
  justify-content: center;
  gap: 100px;
  padding: 120px 20px;
  text-align: center;
}

.stat-box i {
  font-size: 40px;
  color: #00eaff;
  margin-bottom: 10px;
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

.counter {
  display: flex;
  justify-content: center;
  font-size: 48px;
  font-weight: 300;
}

.digit {
  opacity: 0;
  transform: translateY(20px);
  transition: 0.4s;
}

.digit.show {
  opacity: 1;
  transform: translateY(0);
}

.tooltip {
  opacity: 0;
  font-size: 13px;
  margin-top: 10px;
  transition: 0.3s;
}

.stat-box:hover .tooltip {
  opacity: 1;
}
</style>
</head>

<body>

<!-- 🌊 SVG wave -->
<div class="wave">
<svg viewBox="0 0 1200 120" preserveAspectRatio="none">
  <path d="M0,0V46.29c47.79,22,103.59,29,158,17C230,47,284,10,339,6s108,22,162,36c53,14,108,20,162,7,54-13,108-44,162-49s108,16,162,30V0Z" fill="rgba(255,255,255,0.2)"></path>
</svg>
</div>

<section class="stats">

<div class="stat-box">
<i class="fas fa-trash"></i>
<div class="counter" data-target="8"></div>
<p>Million Tons Plastic / Year</p>
<div class="tooltip">Plastic enters ocean yearly</div>
</div>

<div class="stat-box">
<i class="fas fa-globe"></i>
<div class="counter" data-target="80"></div>
<p>% Pollution from Land</p>
<div class="tooltip">Most pollution is land-based</div>
</div>

<div class="stat-box">
<i class="fas fa-shirt"></i>
<div class="counter" data-target="92"></div>
<p>Million Tons Fashion Waste</p>
<div class="tooltip">Fast fashion waste</div>
</div>

<div class="stat-box">
<i class="fas fa-fish"></i>
<div class="counter" data-target="90"></div>
<p>% Marine Life Affected</p>
<div class="tooltip">Plastic harms marine life</div>
</div>

</section>

<script>
// 📊 一定會動的數字動畫
document.querySelectorAll(".counter").forEach(el => {
  let target = el.dataset.target;
  let str = target.toString();

  str.split("").forEach((num, i) => {
    let span = document.createElement("span");
    span.classList.add("digit");
    span.innerText = num;
    el.appendChild(span);

    setTimeout(() => {
      span.classList.add("show");
    }, i * 200);
  });
});
</script>

</body>
</html>
